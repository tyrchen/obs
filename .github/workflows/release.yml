name: release

# Builds and uploads pre-built `obs-cli` binaries on tag push. Spec 90
# § M4 / impl-plan task 5.4 — the M4 exit criterion calls for archives
# on `darwin-{x86_64,arm64}` and `linux-{x86_64,arm64}`.
#
# Triggers:
#   * a tag matching `v*` (e.g. `v1.0.0`)
#   * a manual dispatch from the Actions UI (testing the pipeline
#     before stamping the actual release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cross-compiler (linux-aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo "[target.aarch64-unknown-linux-gnu]"
            echo "linker = \"aarch64-linux-gnu-gcc\""
          } >> .cargo/config.toml

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build obs-cli
        run: cargo build --release --bin obs --target ${{ matrix.target }} -p obs-cli

      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          name="obs-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p dist/$name
          cp target/${{ matrix.target }}/release/obs dist/$name/
          cp README.md dist/$name/
          cp LICENSE.md dist/$name/
          tar -czf dist/$name.tar.gz -C dist $name
          ( cd dist && shasum -a 256 $name.tar.gz > $name.tar.gz.sha256 )
          echo "archive=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/$name.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload archive to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}

      - name: Upload archive as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: obs-cli-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
