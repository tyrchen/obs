syntax = "proto3";
package obs.v1;

import "obs/v1/enums.proto";

// Per spec 10 § 6 — envelope field names are intentionally short.

message ObsEnvelope {
  string full_name = 1;
  fixed64 schema_hash = 2;
  Tier tier = 3;
  Severity sev = 4;
  fixed64 ts_ns = 5;

  string trace_id = 6;
  string span_id = 7;
  string parent_span_id = 8;

  string service = 9;
  string instance = 10;
  string version = 11;

  bytes payload = 12;
  map<string, string> labels = 13;
  SamplingReason sampling_reason = 14;
  fixed64 callsite_id = 15;
}

message ObsBatch {
  uint32 format_ver = 1;
  string batch_id = 2;
  fixed64 started_ns = 3;
  fixed64 closed_ns = 4;
  map<fixed64, string> schemas = 5;
  repeated ObsEnvelope events = 6;
}
