syntax = "proto3";
package todomvc.v1;

import "obs/v1/options.proto";

// A new todo was created. LOG/INFO so we can replay creation history
// from the NDJSON tail without sampling loss. `todo_id` is the
// canonical join key downstream — keep it LOW cardinality (a slug or
// short id) so it can flow into metric labels too.
message ObsTodoCreated {
  option (obs.v1.event) = {
    tier: TIER_LOG,
    default_sev: SEVERITY_INFO,
  };

  string todo_id = 1 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  string title   = 2 [(obs.v1.field) = { kind: ATTRIBUTE }];
  string list    = 3 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
}

// A field on an existing todo was updated. `field_changed` is
// LOW-card (an enum of known column names) so the dashboards can break
// down by it; `new_value` is ATTRIBUTE so it lands in the payload but
// not in metric labels.
message ObsTodoUpdated {
  option (obs.v1.event) = {
    tier: TIER_LOG,
    default_sev: SEVERITY_INFO,
  };

  string todo_id       = 1 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  string field_changed = 2 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  string new_value     = 3 [(obs.v1.field) = { kind: ATTRIBUTE }];
}

// A todo was marked complete. `latency_ms_since_creation` measures
// dwell time end-to-end; recorded as ATTRIBUTE here (not MEASUREMENT)
// because we want it on the LOG event, not on a separate histogram —
// the existing per-route histogram lives on ObsHttpRequestProcessed.
message ObsTodoCompleted {
  option (obs.v1.event) = {
    tier: TIER_LOG,
    default_sev: SEVERITY_INFO,
  };

  string todo_id                     = 1 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  string list                        = 2 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  uint64 latency_ms_since_creation   = 3 [(obs.v1.field) = { kind: ATTRIBUTE }];
}

// A todo was deleted. `was_completed` distinguishes a normal cleanup
// from an abort.
message ObsTodoDeleted {
  option (obs.v1.event) = {
    tier: TIER_LOG,
    default_sev: SEVERITY_INFO,
  };

  string todo_id      = 1 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  string list         = 2 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  bool   was_completed = 3 [(obs.v1.field) = { kind: ATTRIBUTE }];
}

// Per-list query observation — emitted at TIER_METRIC because the two
// numeric fields drive a counter (result_count) and a histogram
// (latency_us) in the metric pipeline.
message ObsTodoListQueried {
  option (obs.v1.event) = {
    tier: TIER_METRIC,
    default_sev: SEVERITY_INFO,
  };

  string list   = 1 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  string filter = 2 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  uint64 result_count = 3 [(obs.v1.field) = {
    kind: MEASUREMENT,
    metric: { kind: METRIC_KIND_COUNTER, unit: "1" }
  }];
  uint64 latency_us = 4 [(obs.v1.field) = {
    kind: MEASUREMENT,
    metric: {
      kind: METRIC_KIND_HISTOGRAM,
      unit: "us",
      bounds: [10.0, 100.0, 1000.0, 10000.0]
    }
  }];
}

// One per HTTP request — the spine of the request lifecycle.
// `latency_ms` is a histogram so percentile dashboards work out of
// the box.
message ObsHttpRequestProcessed {
  option (obs.v1.event) = {
    tier: TIER_LOG,
    default_sev: SEVERITY_INFO,
  };

  string route  = 1 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  string method = 2 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  string status = 3 [(obs.v1.field) = { kind: LABEL, cardinality: LOW }];
  uint64 latency_ms = 4 [(obs.v1.field) = {
    kind: MEASUREMENT,
    metric: {
      kind: METRIC_KIND_HISTOGRAM,
      unit: "ms",
      bounds: [1.0, 10.0, 100.0, 1000.0]
    }
  }];
}
