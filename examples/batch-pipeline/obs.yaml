# obs.yaml — example config for the batch-pipeline analytics quickstart.
# Spec 60 § 2 + spec 95 D8-5.

filter: "info,obs_example_batch_pipeline=debug"

sampling:
  default_rate: 1.0

limits:
  max_payload_bytes: 524288
  max_label_value_bytes: 1024
  max_external_string_bytes: 256

# Parquet sink — single-table sparse layout under `./obs-out/parquet/`,
# partitioned by service + date.
parquet:
  base_dir: "./obs-out/parquet/"
  layout: single
  partition_by: [service, date]
  compression: snappy
  roll_max_bytes: 268435456
  roll_max_age_secs: 300

resource_attrs:
  service_name: "obs-example-batch-pipeline"
  service_namespace: "examples"
  deployment_environment: "dev"
